services:
  - type: web
    name: barber-backend
    env: docker # Using docker so we can run the migrate script efficiently, or "node" if leveraging Render Native Node runtime. Since Docker is recommended, we map to Dockerfile.
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: barber-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: barber-db
    databaseName: barber_booking
    user: barber_user
